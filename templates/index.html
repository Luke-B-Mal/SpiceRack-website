<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpiceRack</title>
    <link rel="stylesheet" href="../static/style.css">
    <link href="https://googleapis.com" rel="stylesheet">
</head>
<!---->
<body>
    <h1>Hello Beau! Welcome to <span class="italic-sr">SpiceRack</span>.</h1>
    <h2>We're glad you're here.</h2>
    <div class="container">
        <div class="recipe-box">
            <div class="header-r">
                <h1 class="rb-title">Your Recipes</h1>
            </div>
            <div class="body-r"></div>
        </div>
        <div class="spice-box">
            <div class="header-s">
                <h1 class="sb-title">Your Spices</h1>
            </div>
            <div class="body-s"></div>
            <div class="header-s-2">
                <h1 class="sb-h2-title">Add Spices</h1>
            </div>
            <div class="body-s-input">
                <form action="/add_spices" method="post">
                    <textarea id="spice-input" name="user-data" placeholder="I.e: sea salt, garlic powder, etc..."></textarea>
                </form>
            </div>
            <div class="submit-box" role="button" tabindex="0" id="submit-box">
                <h1 class="submit-text">Submit</h1>
            </div>
        </div>
    </div>
</body>
</html
